<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Count with Kids - OG Image Template (1200x630 — screenshot this)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  .og-canvas {
    width: 1200px;
    height: 630px;
    background: #FFF9F0;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
    font-family: 'Comic Neue', 'Baloo 2', system-ui, sans-serif;
  }

  h1, h2, h3, .app-name, .badge, .tagline-sub {
    font-family: 'Baloo 2', 'Comic Neue', system-ui, sans-serif;
  }

  /* --- Decorative circles (same style as page) --- */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    border: 3px solid;
    opacity: 0.15;
    pointer-events: none;
  }

  /* --- Decorative stars (same SVG path as page) --- */
  .deco-star {
    position: absolute;
    pointer-events: none;
    opacity: 0.12;
  }

  /* --- Left side content --- */
  .left-content {
    flex: 1;
    padding: 50px 30px 50px 65px;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .app-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .app-icon {
    width: 90px;
    height: 90px;
    border-radius: 24px;
    border: 3px solid #FFD93D;
    box-shadow:
      6px 6px 0px rgba(0,0,0,0.08),
      inset -2px -2px 6px rgba(0,0,0,0.04),
      inset 2px 2px 6px rgba(255,255,255,0.6);
    object-fit: cover;
    flex-shrink: 0;
  }

  .app-name {
    font-weight: 800;
    font-size: 44px;
    color: #1ABC9C;
    line-height: 1.1;
  }

  .app-name .highlight {
    background: linear-gradient(135deg, #FF6B6B 0%, #FFD93D 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline-sub {
    font-weight: 600;
    font-size: 24px;
    color: #636E72;
    margin-bottom: 28px;
    padding-left: 4px;
  }

  /* --- Badges (same clay style as page privacy badges) --- */
  .badges {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 50px;
    border: 3px solid #e8e8e8;
    background: #FFFFFF;
    font-weight: 700;
    font-size: 16px;
    color: #2D3436;
    box-shadow:
      4px 4px 0px rgba(0,0,0,0.06),
      inset -1px -1px 4px rgba(0,0,0,0.03),
      inset 1px 1px 4px rgba(255,255,255,0.5);
  }

  .badge svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  /* --- Right side phone mockup --- */
  .right-content {
    width: 440px;
    height: 100%;
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 30px;
  }

  .phone-frame {
    width: 260px;
    height: 520px;
    background: #1a1a2e;
    border-radius: 36px;
    border: 3px solid #333;
    padding: 12px;
    box-shadow:
      6px 6px 0px rgba(0,0,0,0.1),
      inset -2px -2px 6px rgba(0,0,0,0.04),
      inset 2px 2px 6px rgba(255,255,255,0.08);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(2deg);
  }

  .phone-notch {
    display: none;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 26px;
    overflow: hidden;
    background: #FFF9F0;
  }

  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Clay card behind phone (same style as page feature cards) */
  .phone-bg-card {
    position: absolute;
    width: 280px;
    height: 500px;
    background: #FFFFFF;
    border-radius: 28px;
    border: 3px solid #e8e8e8;
    box-shadow:
      6px 6px 0px rgba(0,0,0,0.08),
      inset -2px -2px 6px rgba(0,0,0,0.04),
      inset 2px 2px 6px rgba(255,255,255,0.6);
    transform: rotate(-3deg);
    z-index: -1;
  }

  /* --- Wavy bottom edge (same as page section dividers) --- */
  .wave-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    line-height: 0;
    z-index: 1;
  }

  .wave-bottom svg {
    display: block;
    width: 100%;
    height: 40px;
  }
</style>
</head>
<body>
<div class="og-canvas">
  <!-- Decorative circles (same border-only style as page) -->
  <div class="deco-circle" style="width:200px;height:200px;border-color:#a8f0dc;top:-50px;left:-40px;"></div>
  <div class="deco-circle" style="width:140px;height:140px;border-color:#ffa8a8;bottom:-30px;left:320px;"></div>
  <div class="deco-circle" style="width:160px;height:160px;border-color:#ddd6fe;top:-40px;right:140px;"></div>
  <div class="deco-circle" style="width:100px;height:100px;border-color:#FFD93D;bottom:40px;right:30px;opacity:0.12;"></div>

  <!-- Decorative stars (same SVG as page) -->
  <svg class="deco-star" style="top:30px;left:440px;width:28px;height:28px;" viewBox="0 0 24 24" fill="#FFD93D"><path d="M12 2l2.09 6.26L20.18 9.27l-5.09 3.9L16.82 20 12 16.27 7.18 20l1.73-6.83L3.82 9.27l6.09-1.01z"/></svg>
  <svg class="deco-star" style="top:100px;right:90px;width:22px;height:22px;" viewBox="0 0 24 24" fill="#F472B6"><path d="M12 2l2.09 6.26L20.18 9.27l-5.09 3.9L16.82 20 12 16.27 7.18 20l1.73-6.83L3.82 9.27l6.09-1.01z"/></svg>
  <svg class="deco-star" style="bottom:80px;left:100px;width:32px;height:32px;" viewBox="0 0 24 24" fill="#A78BFA"><path d="M12 2l2.09 6.26L20.18 9.27l-5.09 3.9L16.82 20 12 16.27 7.18 20l1.73-6.83L3.82 9.27l6.09-1.01z"/></svg>
  <svg class="deco-star" style="bottom:60px;right:340px;width:24px;height:24px;" viewBox="0 0 24 24" fill="#1ABC9C"><path d="M12 2l2.09 6.26L20.18 9.27l-5.09 3.9L16.82 20 12 16.27 7.18 20l1.73-6.83L3.82 9.27l6.09-1.01z"/></svg>

  <!-- Wavy bottom (same style as page section dividers) -->
  <div class="wave-bottom">
    <svg viewBox="0 0 1200 40" preserveAspectRatio="none" fill="#1ABC9C" opacity="0.15">
      <path d="M0,40 C200,0 400,35 600,15 C800,0 1000,35 1200,10 L1200,40 L0,40 Z"/>
    </svg>
  </div>

  <!-- Left: branding + badges -->
  <div class="left-content">
    <div class="app-header">
      <img class="app-icon" src="assets/app-icon.png" alt="Count with Kids icon">
      <div class="app-name">Count with<br><span class="highlight">Kids</span></div>
    </div>
    <div class="tagline-sub">Fun Math Practice for Kids</div>
    <div class="badges">
      <span class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1ABC9C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        No Ads
      </span>
      <span class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        Ages 4+
      </span>
      <span class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f0c400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        5-Star Rated
      </span>
    </div>
  </div>

  <!-- Right: phone mockup -->
  <div class="right-content">
    <div class="phone-bg-card"></div>
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <img src="assets/screenshot-home.png" alt="App screenshot">
      </div>
    </div>
  </div>
</div>
</body>
</html>
